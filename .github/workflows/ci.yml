name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Use the head SHA so that re-runs of older commits don't cancel the run
  # for the current commit (and vice versa). A new push to the branch is the
  # only thing that should kill a stale in-progress run.
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: write       # needed to create/move release tags
  pull-requests: write

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
        continue-on-error: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile debug
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :app:compileDebugKotlin --stacktrace 2>&1 | tee /tmp/compile.log

      - name: Lint (debug)
        id: lint
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Print lint text report
        if: always()
        run: |
          report="app/build/reports/lint-results-debug.txt"
          if [ -f "$report" ]; then
            echo "::group::Lint text report"
            cat "$report"
            echo "::endgroup::"
          else
            echo "Lint text report not found at $report"
            find app/build/reports -type f 2>/dev/null || true
          fi

      - name: Post compile error as PR comment
        if: steps.compile.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Compile debug failed (run ${{ github.run_id }})"
            echo ""
            echo "### Kotlin compiler errors (lines starting with \`e:\`)"
            echo '```'
            grep -E '^(e:|w:|FAILURE|Caused by|\* What went wrong|> Task .* FAILED)' /tmp/compile.log 2>/dev/null \
              | head -n 80 \
              || echo "(no compiler errors matched)"
            echo '```'
            echo ""
            echo "### First 80 lines around the failed task"
            echo '```'
            awk '/Task :.*compileDebugKotlin/{p=1} p' /tmp/compile.log 2>/dev/null | head -n 80 \
              || echo "(no task section found)"
            echo '```'
          } > /tmp/compile-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/compile-comment.md

      - name: Post lint report as PR comment
        if: always() && steps.lint.outcome != 'skipped' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          report="app/build/reports/lint-results-debug.txt"
          {
            echo "## Lint debug report (run ${{ github.run_id }})"
            echo ""
            if [ -f "$report" ]; then
              echo '```'
              cat "$report"
              echo '```'
            else
              echo "_Text report not produced. Files under \`app/build/reports\`:_"
              echo ''
              echo '```'
              find app/build/reports -type f 2>/dev/null || echo "(none)"
              echo '```'
            fi
          } > /tmp/lint-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/lint-comment.md

      - name: Unit tests
        id: unit_tests
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew :app:testDebugUnitTest --stacktrace 2>&1 | tee /tmp/unit-tests.log

      - name: Post unit test failure as PR comment
        if: steps.unit_tests.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## Unit tests failed (run ${{ github.run_id }})"
            echo ""
            echo "_Last 200 lines of test output:_"
            echo ''
            echo '```'
            tail -n 200 /tmp/unit-tests.log 2>/dev/null || echo "(no log)"
            echo '```'
          } > /tmp/tests-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/tests-comment.md

      - name: Assemble debug APK
        id: assemble
        if: steps.compile.outcome == 'success'
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: steps.assemble.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish APK as rolling release (mobile-downloadable)
        if: steps.assemble.outcome == 'success' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="latest-debug"
          short_sha="${GITHUB_SHA:0:7}"
          src_apk=$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)
          if [ -z "$src_apk" ]; then
            echo "No APK produced"; exit 1
          fi
          renamed="checkingContainer-debug-${short_sha}.apk"
          cp "$src_apk" "/tmp/$renamed"

          # Move the rolling tag: delete old release+tag, create new one.
          gh release delete "$tag" --yes --cleanup-tag \
            --repo "${{ github.repository }}" || true

          gh release create "$tag" "/tmp/$renamed" \
            --repo "${{ github.repository }}" \
            --target "${GITHUB_SHA}" \
            --title "Latest debug build" \
            --prerelease \
            --notes "$(cat <<EOF
          Auto-generated debug APK — commit \`${short_sha}\` en \`${{ github.ref_name }}\`.

          **Instalar en Android:**
          1. Tocá el archivo \`checkingContainer-debug-*.apk\` de abajo.
          2. Permitir la instalación desde fuentes desconocidas si lo pide.
          3. Abrí el instalador.

          El tag se mueve en cada CI exitoso, siempre es el build más reciente.
          EOF
          )"

      - name: Fail if compile or assemble failed
        if: steps.compile.outcome == 'failure' || steps.assemble.outcome == 'failure'
        run: |
          echo "Build failed: compile=${{ steps.compile.outcome }} assemble=${{ steps.assemble.outcome }}"
          echo "Lint and unit-tests are informational and do not fail the build."
          exit 1

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14
