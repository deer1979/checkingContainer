name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile debug
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Lint (debug)
        id: lint
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Print lint text report
        if: always()
        run: |
          report="app/build/reports/lint-results-debug.txt"
          if [ -f "$report" ]; then
            echo "::group::Lint text report"
            cat "$report"
            echo "::endgroup::"
          else
            echo "Lint text report not found at $report"
            find app/build/reports -type f 2>/dev/null || true
          fi

      - name: Post lint report as PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          report="app/build/reports/lint-results-debug.txt"
          {
            echo "## Lint debug report (run ${{ github.run_id }})"
            echo ""
            if [ -f "$report" ]; then
              echo '```'
              cat "$report"
              echo '```'
            else
              echo "_Text report not produced. Files under \`app/build/reports\`:_"
              echo ''
              echo '```'
              find app/build/reports -type f 2>/dev/null || echo "(none)"
              echo '```'
            fi
          } > /tmp/lint-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/lint-comment.md

      - name: Fail if lint step failed
        if: steps.lint.outcome == 'failure'
        run: |
          echo "Lint task failed — see 'Print lint text report' above."
          exit 1

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14
