# Project-wide Gradle settings.
# https://docs.gradle.org/current/userguide/build_environment.html

# JVM args for Gradle daemon (4 GB heap, parallel GC for big projects).
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# Build features.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# Kotlin
kotlin.code.style=official

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=true

# Suppress unsupported-compileSdk warning when bumping to a brand-new API level.
android.suppressUnsupportedCompileSdk=36
